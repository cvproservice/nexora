<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="100%" style="stop-color:#0d0d2b"/>
    </linearGradient>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="spot1" cx="20%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="spot2" cx="80%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#spot1)"/>
  <rect width="1200" height="630" fill="url(#spot2)"/>

  <!-- Grid lines subtle -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="400" y1="0" x2="400" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
  <line x1="800" y1="0" x2="800" y2="630" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>

  <!-- Border glow -->
  <rect x="2" y="2" width="1196" height="626" fill="none" stroke="url(#g1)" stroke-width="2" rx="0" opacity="0.3"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#g1)"/>

  <!-- Logo NEXORA - English OK -->
  <text x="80" y="110" font-family="Arial Black, sans-serif" font-size="64" font-weight="900" letter-spacing="8" fill="url(#g1)" filter="url(#glow)">NEXORA</text>

  <!-- Tagline Arabic - right to left rendering via unicode bidi -->
  <text x="1120" y="165" font-family="Arial, sans-serif" font-size="26" fill="rgba(255,255,255,0.6)" text-anchor="end" direction="rtl">نيكسورا — وكالة رقمية متكاملة</text>

  <!-- Divider -->
  <rect x="80" y="180" width="160" height="3" fill="url(#g1)" rx="2"/>

  <!-- Main headline Arabic - right anchored for RTL -->
  <text x="1120" y="265" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="white" text-anchor="end" direction="rtl">تصميم مواقع ومتاجر إلكترونية</text>
  <text x="1120" y="330" font-family="Arial, sans-serif" font-size="50" font-weight="900" fill="white" text-anchor="end" direction="rtl">احترافية في مصر والخليج</text>

  <!-- Sub Arabic -->
  <text x="1120" y="390" font-family="Arial, sans-serif" font-size="24" fill="rgba(255,255,255,0.55)" text-anchor="end" direction="rtl">تحسين SEO · تصميم مخصص · متاجر إلكترونية · دعم ٢٤ ساعة</text>

  <!-- Stars row -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="34" fill="#fbbf24">★★★★★</text>
  <text x="290" y="450" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">4.9 / 5</text>
  <text x="370" y="450" font-family="Arial, sans-serif" font-size="18" fill="rgba(255,255,255,0.45)" direction="rtl">من 180+ عميل سعيد</text>

  <!-- Stats boxes -->
  <rect x="80" y="480" width="185" height="85" rx="14" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="172" y="518" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#00d4ff" text-anchor="middle">250+</text>
  <text x="172" y="548" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle" direction="rtl">مشروع منجز</text>

  <rect x="285" y="480" width="185" height="85" rx="14" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="377" y="518" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#00d4ff" text-anchor="middle">7+</text>
  <text x="377" y="548" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle" direction="rtl">سنوات خبرة</text>

  <rect x="490" y="480" width="185" height="85" rx="14" fill="rgba(0,212,255,0.08)" stroke="rgba(0,212,255,0.3)" stroke-width="1.5"/>
  <text x="582" y="518" font-family="Arial Black, sans-serif" font-size="34" font-weight="900" fill="#00d4ff" text-anchor="middle">98%</text>
  <text x="582" y="548" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.6)" text-anchor="middle" direction="rtl">رضا العملاء</text>

  <!-- WhatsApp badge -->
  <rect x="720" y="480" width="260" height="85" rx="42" fill="#25d366"/>
  <text x="850" y="515" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="white" text-anchor="middle" direction="rtl">تواصل معنا الآن</text>
  <text x="850" y="545" font-family="Arial, sans-serif" font-size="17" fill="rgba(255,255,255,0.9)" text-anchor="middle">+20 106 820 4700</text>

  <!-- Right decoration -->
  <circle cx="1060" cy="290" r="195" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.2"/>
  <circle cx="1060" cy="290" r="145" fill="none" stroke="url(#g1)" stroke-width="1" opacity="0.15"/>
  <circle cx="1060" cy="290" r="95" fill="url(#g2)" opacity="0.5"/>
  <text x="1060" y="265" font-family="Arial, sans-serif" font-size="65" text-anchor="middle">🌐</text>
  <text x="1060" y="345" font-family="Arial Black, sans-serif" font-size="18" fill="rgba(255,255,255,0.65)" text-anchor="middle">nexora.github.io</text>
</svg>
